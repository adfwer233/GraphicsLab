site_name: GraphicsLab Documentation
theme:
  name: material

nav:
  - Home: index.md
  - GraphicsLab:
      - Get Started: graphicslab/get_started.md
  - Language:
      - Overview: language/language.md
      - Reflection: language/refelction.md
      - Parallel: language/parallel.md
