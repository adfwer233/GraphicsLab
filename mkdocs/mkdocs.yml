              - Analytic Curves: geometry/parametric geometry/curves/analytic_curves.md
              - Bezier Curves: geometry/parametric geometry/curves/bezier_curves.md
          - Surfaces:
              - Base Surface: geometry/parametric geometry/surfaces/base_surface.md
              - Analytic Surfaces: geometry/parametric geometry/surfaces/analytic_surfaces.md
              - Explicit Surfaces: geometry/parametric geometry/surfaces/explicit_surfaces.md
      - Boundary Representation:
          - Topology Definition: geometry/boundary representation/topology_definition.md
          - Intersectors: geometry/boundary representation/intersector/intersectors.md
